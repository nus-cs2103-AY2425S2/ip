plugins {
    id 'java'
    id 'application'
    id 'com.github.johnrengelman.shadow' version '7.1.2'
}

repositories {
    mavenCentral()
}

dependencies {
    String javaFxVersion = '17.0.7'

    // Test dependencies
    testImplementation group: 'org.junit.jupiter', name: 'junit-jupiter-api', version: '5.10.0'
    testRuntimeOnly group: 'org.junit.jupiter', name: 'junit-jupiter-engine', version: '5.10.0'

    // Dynamically include JavaFX dependencies based on the operating system
    String osName = System.getProperty('os.name').toLowerCase()
    String platform = ''

    if (osName.contains('win')) {
        platform = 'win'
    } else if (osName.contains('linux')) {
        platform = 'linux'
    } else if (osName.contains('mac')) {
        // Check for Apple Silicon (ARM64) or Intel (x86_64)
        String osArch = System.getProperty('os.arch').toLowerCase()
        if (osArch.contains('aarch64') || osArch.contains('arm64')) {
            platform = 'mac-aarch64'
        } else {
            platform = 'mac'
        }
    } else {
        throw new GradleException("Unsupported operating system: ${osName}")
    }

    // Add JavaFX dependencies for the detected platform
    implementation group: 'org.openjfx', name: 'javafx-base', version: javaFxVersion, classifier: platform
    implementation group: 'org.openjfx', name: 'javafx-controls', version: javaFxVersion, classifier: platform
    implementation group: 'org.openjfx', name: 'javafx-fxml', version: javaFxVersion, classifier: platform
    implementation group: 'org.openjfx', name: 'javafx-graphics', version: javaFxVersion, classifier: platform
}

test {
    useJUnitPlatform()
    testLogging {
        events "passed", "skipped", "failed"
        showExceptions true
        exceptionFormat "full"
        showCauses true
        showStackTraces true
        showStandardStreams = false
    }
}

application {
    mainClass.set("babe.Launcher")
}

shadowJar {
    archiveBaseName = "babe"
    archiveClassifier = null
}

run {
    standardInput = System.in
    jvmArgs = [
            '--module-path', classpath.asPath,
            '--add-modules', 'javafx.controls,javafx.fxml,javafx.graphics,javafx.base',
            // Allow private reflection required by FXMLLoader
            '--add-opens', 'javafx.graphics/javafx.scene=ALL-UNNAMED',
            '--add-opens', 'javafx.controls/javafx.scene.control=ALL-UNNAMED',
            '--add-opens', 'javafx.controls/javafx.scene.control.skin=ALL-UNNAMED',
            '--add-opens', 'javafx.base/javafx.binding=ALL-UNNAMED',
            '--add-opens', 'javafx.base/javafx.event=ALL-UNNAMED',
            '--add-opens', 'javafx.base/javafx.beans=ALL-UNNAMED',
            '--add-opens', 'javafx.base/javafx.beans.value=ALL-UNNAMED',
            '--add-opens', 'javafx.base/javafx.collections=ALL-UNNAMED',
            '--add-opens', 'javafx.fxml/javafx.fxml=ALL-UNNAMED'
    ]
}